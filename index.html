<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.O.S Negroni — ABB Bartenders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,900;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--nero:#080605;--rosso:#D9142B;--rosso-deep:#8E0E1C;--crema:#F4ECDE;--crema-dim:#B9AE9E;--oro:#C7A24C}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(70% 42% at 50% 38%, rgba(217,20,43,.18) 0%, transparent 62%),
      radial-gradient(120% 80% at 50% 4%, #1c0c0c 0%, var(--nero) 52%), var(--nero);
    color:var(--crema);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;
    display:flex;justify-content:center;min-height:100dvh;overflow-x:hidden;
  }
  .phone{width:100%;max-width:440px;min-height:100dvh;padding:30px 28px 28px;display:flex;flex-direction:column;position:relative;isolation:isolate}
  .phone::after{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(135% 90% at 50% 30%, transparent 54%, rgba(0,0,0,.6) 100%);z-index:5}

  .topbar{display:flex;justify-content:space-between;align-items:center;font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--crema-dim);z-index:6}
  .brand{color:var(--crema);font-weight:700;display:inline-flex;align-items:center;gap:9px}
  .brand .logo{width:27px;height:27px;border-radius:50%;display:block}
  .brand b{color:var(--rosso)}
  .age{border:1px solid rgba(244,236,222,.25);border-radius:30px;padding:4px 10px;font-weight:600}

  .since{margin-top:30px;text-align:center;z-index:6}
  .since .lbl{font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--crema-dim)}
  .clock{margin-top:10px;font-variant-numeric:tabular-nums;font-weight:700;font-size:clamp(34px,10vw,44px);letter-spacing:.01em;color:#fff}
  .clock .u{color:var(--rosso);font-weight:600;font-size:.5em;margin:0 .12em 0 .02em}
  .status{margin-top:12px;font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:15px;color:var(--oro)}

  .stage{flex:1;display:flex;align-items:center;justify-content:center;position:relative;z-index:6;margin:26px 0;min-height:180px}
  .glass{width:min(54%,210px);height:auto;display:block;filter:drop-shadow(0 20px 30px rgba(0,0,0,.55))}
  .bloom{transform-origin:140px 160px;animation:beat 4.8s ease-in-out infinite}
  @keyframes beat{0%,100%{opacity:.7;transform:scale(.97)}50%{opacity:1;transform:scale(1.05)}}

  .title{font-family:'Fraunces',serif;text-align:center;z-index:6;line-height:.92;margin-bottom:30px}
  .title .sos{display:block;font-weight:900;font-size:clamp(54px,17vw,82px);letter-spacing:.01em;color:#fff;text-shadow:0 3px 0 rgba(0,0,0,.35),0 0 40px rgba(217,20,43,.45)}
  .title .neg{display:block;margin-top:-4px;font-family:'Anton',sans-serif;font-weight:400;font-size:clamp(40px,13vw,60px);letter-spacing:.06em;color:var(--crema);text-shadow:0 2px 0 rgba(0,0,0,.3)}

  .cta{
    width:100%;border:none;cursor:pointer;
    background:linear-gradient(180deg,#E5172E 0%,var(--rosso-deep) 100%);color:#fff;
    font-family:'Inter',sans-serif;font-weight:700;font-size:17px;letter-spacing:.02em;
    padding:19px;border-radius:40px;display:flex;align-items:center;justify-content:center;gap:11px;
    box-shadow:0 0 32px -4px rgba(217,20,43,.65),0 10px 26px -8px rgba(0,0,0,.6);
    z-index:6;animation:pulse 2.4s ease-in-out infinite;transition:transform .12s ease;
  }
  .cta:active{transform:scale(.985)}
  .cta .dot{width:12px;height:12px;border-radius:50%;background:#fff;box-shadow:0 0 12px #fff}
  @keyframes pulse{0%,100%{box-shadow:0 0 24px -6px rgba(217,20,43,.55),0 10px 26px -8px rgba(0,0,0,.6)}50%{box-shadow:0 0 40px 0 rgba(217,20,43,.8),0 10px 26px -8px rgba(0,0,0,.6)}}

  .qr{display:flex;align-items:center;gap:16px;margin-top:26px;z-index:6}
  .qr-img{width:88px;height:88px;border-radius:18px;background:var(--crema);padding:7px;flex:0 0 auto;box-shadow:0 8px 22px -8px rgba(0,0,0,.6)}
  .qr-img img{width:100%;height:100%;display:block;border-radius:8px}
  .qr-1{font-weight:700;font-size:17px;color:#fff;letter-spacing:.01em}
  .qr-2{font-weight:700;font-size:15px;color:var(--rosso);margin-top:2px}
  .qr-3{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--crema-dim);margin-top:6px;letter-spacing:.04em}

  .foot{text-align:center;margin-top:22px;z-index:6;font-size:9.5px;letter-spacing:.26em;text-transform:uppercase;color:rgba(185,174,158,.5)}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--crema);color:var(--nero);font-weight:600;font-size:14px;padding:13px 20px;border-radius:30px;box-shadow:0 14px 40px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:.35s ease;z-index:30;max-width:90vw;text-align:center}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  @media (prefers-reduced-motion: reduce){.bloom,.cta{animation:none}}
</style>
</head>

  <div class="toast" id="toast"></div>

<script>
  const STATUS=[{d:0,t:'La cuenta sigue corriendo. 🍊'},{d:1,t:'En su punto justo.'},{d:4,t:'Se está calentando el hielo…'},{d:8,t:'Tu reserva está bajando.'},{d:15,t:'Emergencia aperitivo.'},{d:30,t:'¿Seguís vivo? Hace mucho…'}];
  const KEY='sos-negroni-state';
  async function load(){try{if(window.storage){const r=await window.storage.get(KEY);return r?JSON.parse(r.value):null;}}catch(e){}try{if(typeof localStorage!=='undefined'){const v=localStorage.getItem(KEY);return v?JSON.parse(v):null;}}catch(e){}return null;}
  async function save(st){try{if(window.storage){await window.storage.set(KEY,JSON.stringify(st));return;}}catch(e){}try{if(typeof localStorage!=='undefined'){localStorage.setItem(KEY,JSON.stringify(st));}}catch(e){}}
  let state={last:null};
  const $=id=>document.getElementById(id);
  function pad(n){return String(n).padStart(2,'0')}
  function statusFor(days){let s=STATUS[0];for(const x of STATUS){if(days>=x.d)s=x;}return s.t;}
  function setFill(frac){const bottom=244,top=66;const fullH=bottom-top;const h=Math.max(14,fullH*frac);const y=bottom-h;$('fillRect').setAttribute('y',y);$('fillRect').setAttribute('height',h);$('surface').setAttribute('y',y-2);}
  function tick(){
    if(!state.last){$('clock').innerHTML='00<span class="u">d</span>00<span class="u">h</span>00<span class="u">m</span>00<span class="u">s</span>';$('status').textContent='Tocá el botón cuando te tomes uno.';setFill(0.55);return;}
    let s=Math.floor((Date.now()-state.last)/1000);const d=Math.floor(s/86400);s-=d*86400;const h=Math.floor(s/3600);s-=h*3600;const m=Math.floor(s/60);s-=m*60;
    $('clock').innerHTML=pad(d)+'<span class="u">d</span>'+pad(h)+'<span class="u">h</span>'+pad(m)+'<span class="u">m</span>'+pad(s)+'<span class="u">s</span>';
    $('status').textContent=statusFor(d);
    const frac=Math.max(0.10,Math.min(0.6,0.6-(d/30)*0.5));setFill(frac);
  }
  const toast=$('toast');let tt;function showToast(t){toast.textContent=t;toast.classList.add('on');clearTimeout(tt);tt=setTimeout(()=>toast.classList.remove('on'),2800);}
  function diasDesde(){if(!state.last)return null;return Math.floor((Date.now()-state.last)/86400000);}

  $('sos').addEventListener('click',()=>{
    const d=diasDesde();const desde=d===null?'demasiado':(d>0?`hace ${d} día${d>1?'s':''}`:'hoy mismo');
    const msg=`🔴 S.O.S NEGRONI 🔴\n\n¿Cuándo fue tu último Negroni? El mío fue ${desde} y la sed aprieta.\nBusco con quién tomar uno. ¿Te sumás? 🍸\n\n— enviado con S.O.S Negroni · ABB Bartenders`;
    if(navigator.share){navigator.share({title:'S.O.S NEGRONI',text:msg}).catch(()=>{});}else{window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');}
    showToast('🚨 Bengala lanzada');
  });

  (async()=>{const saved=await load();if(saved&&typeof saved.last!=='undefined')state=saved;tick();setInterval(tick,1000);})();
</script>
