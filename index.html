<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.O.S Negroni — ABB Bartenders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --nero:#080605; --rosso:#D9142B; --rosso-deep:#8E0E1C;
    --crema:#F4ECDE; --crema-dim:#B9AE9E; --oro:#C7A24C;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(80% 50% at 50% 40%, rgba(217,20,43,.16) 0%, transparent 60%),
      radial-gradient(120% 80% at 50% 4%, #1c0c0c 0%, var(--nero) 52%), var(--nero);
    color:var(--crema);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;
    display:flex;justify-content:center;min-height:100dvh;overflow-x:hidden;
  }
  .phone{width:100%;max-width:440px;min-height:100dvh;padding:28px 26px 34px;display:flex;flex-direction:column;position:relative;isolation:isolate}
  .phone::after{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(135% 90% at 50% 30%, transparent 52%, rgba(0,0,0,.62) 100%);z-index:5}

  .topbar{display:flex;justify-content:space-between;align-items:center;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--crema-dim);z-index:6}
  .brand{color:var(--crema);font-weight:700}
  .brand b{color:var(--rosso)}
  .age{border:1px solid rgba(244,236,222,.25);border-radius:30px;padding:4px 9px;font-weight:600}

  .since{margin-top:26px;text-align:center;z-index:6}
  .since .lbl{font-size:10.5px;letter-spacing:.34em;text-transform:uppercase;color:var(--crema-dim)}
  .clock{margin-top:6px;font-variant-numeric:tabular-nums;font-weight:700;font-size:clamp(27px,8.4vw,36px);letter-spacing:.02em;color:#fff}
  .clock .u{color:var(--rosso);font-weight:600;font-size:.55em;margin:0 .14em 0 .03em}
  .status{margin-top:6px;font-family:'Fraunces',serif;font-style:italic;font-size:14px;color:var(--oro)}

  .stage{flex:1;display:flex;align-items:center;justify-content:center;position:relative;z-index:6;margin:20px 0;min-height:170px}
  .glass{width:min(64%,250px);height:auto;display:block;filter:drop-shadow(0 22px 30px rgba(0,0,0,.6))}
  .bloom{transform-origin:160px 150px;animation:beat 4.6s ease-in-out infinite}
  @keyframes beat{0%,100%{opacity:.72;transform:scale(.97)}50%{opacity:1;transform:scale(1.05)}}

  .title{font-family:'Fraunces',serif;text-align:center;z-index:6;line-height:.96;margin-bottom:34px}
  .title .sos{
    display:block;font-family:'Arial Black','Arial Narrow Bold',Arial,sans-serif;font-weight:900;
    font-size:clamp(46px,15vw,70px);letter-spacing:.02em;color:#fff;
    text-shadow:0 0 14px rgba(217,20,43,.9),0 0 34px rgba(217,20,43,.7),0 0 60px rgba(217,20,43,.5);
  }
  .title .neg{display:block;margin-top:2px;font-family:'Bebas Neue',Arial,sans-serif;font-weight:400;font-size:clamp(30px,10vw,46px);letter-spacing:.2em;color:var(--crema)}

  /* ---- BOTON SEÑAL = LOGO ABB (baliza) ---- */
  .beacon-wrap{position:relative;display:flex;flex-direction:column;align-items:center;z-index:6;margin-top:8px}
  .beacon-wrap::before{content:"";position:absolute;top:-16px;width:168px;height:168px;border-radius:50%;background:radial-gradient(circle,rgba(217,20,43,.45) 0%,transparent 66%);z-index:-1;animation:beat 3.4s ease-in-out infinite}
  .beacon{position:relative;width:122px;height:122px;border-radius:50%;border:none;background:transparent;padding:0;cursor:pointer;transition:transform .12s ease}
  .beacon:active{transform:scale(.95)}
  .beacon .logo{width:100%;height:100%;border-radius:50%;display:block;box-shadow:0 12px 30px rgba(0,0,0,.55),0 0 0 4px rgba(244,236,222,.08)}
  .beacon::after{content:"";position:absolute;inset:0;border-radius:50%;box-shadow:0 0 0 0 rgba(217,20,43,.65);animation:distress 1.9s ease-out infinite}
  @keyframes distress{0%{box-shadow:0 0 0 0 rgba(217,20,43,.65)}70%{box-shadow:0 0 0 30px rgba(217,20,43,0)}100%{box-shadow:0 0 0 0 rgba(217,20,43,0)}}
  .beacon-label{margin-top:18px;font-size:11px;font-weight:700;letter-spacing:.26em;text-transform:uppercase;color:#fff}
  .beacon-label b{color:var(--rosso)}
  .beacon-sub{margin-top:3px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--crema-dim)}

  .row{display:flex;gap:10px;margin-top:34px;z-index:6}
  .mini{flex:1;cursor:pointer;background:rgba(244,236,222,.04);border:1px solid rgba(244,236,222,.16);color:var(--crema);font-family:'Inter',sans-serif;font-weight:600;font-size:12px;letter-spacing:.01em;padding:12px 6px;border-radius:13px;display:flex;flex-direction:column;align-items:center;gap:5px;transition:.2s ease;text-align:center}
  .mini:hover{border-color:rgba(244,236,222,.5);background:rgba(244,236,222,.07)}
  .mini svg{width:18px;height:18px;stroke:var(--crema);fill:none;stroke-width:1.7}

  .reg-btn{width:100%;margin-top:12px;cursor:pointer;background:var(--crema);border:none;color:var(--nero);font-family:'Inter',sans-serif;font-weight:700;font-size:14.5px;padding:16px;border-radius:14px;transition:transform .12s ease,opacity .2s ease;z-index:6}
  .reg-btn:active{transform:scale(.99);opacity:.92}

  .foot{text-align:center;margin-top:22px;z-index:6;font-size:9px;letter-spacing:.26em;text-transform:uppercase;color:rgba(185,174,158,.55)}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--crema);color:var(--nero);font-weight:600;font-size:14px;padding:13px 20px;border-radius:30px;box-shadow:0 14px 40px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:.35s ease;z-index:30;max-width:90vw;text-align:center}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (prefers-reduced-motion: reduce){.bloom,.beacon::after,.beacon-wrap::before{animation:none}}
</style>
</head>

  <div class="toast" id="toast"></div>

<script>
  const STATUS=[{d:0,t:'Recién servido. Salud. 🍊'},{d:1,t:'En su punto justo.'},{d:4,t:'Se está calentando el hielo…'},{d:8,t:'Tu reserva está bajando.'},{d:15,t:'Emergencia aperitivo.'},{d:30,t:'¿Seguís vivo? Hace mucho…'}];
  const KEY='sos-negroni-state';
  async function load(){try{if(window.storage){const r=await window.storage.get(KEY);return r?JSON.parse(r.value):null;}}catch(e){}try{if(typeof localStorage!=='undefined'){const v=localStorage.getItem(KEY);return v?JSON.parse(v):null;}}catch(e){}return null;}
  async function save(st){try{if(window.storage){await window.storage.set(KEY,JSON.stringify(st));return;}}catch(e){}try{if(typeof localStorage!=='undefined'){localStorage.setItem(KEY,JSON.stringify(st));}}catch(e){}}
  let state={last:null};
  const $=id=>document.getElementById(id);
  function pad(n){return String(n).padStart(2,'0')}
  function statusFor(days){let s=STATUS[0];for(const x of STATUS){if(days>=x.d)s=x;}return s.t;}
  function setFill(frac){const top=232,full=112;const y=top-(top-full)*frac;$('fillRect').setAttribute('y',y);$('fillRect').setAttribute('height',top-y+4);$('surface').setAttribute('cy',y);$('surface2').setAttribute('cy',y);const w=92*(0.6+0.4*Math.min(1,(top-y)/(top-full)));$('surface').setAttribute('rx',w);$('surface2').setAttribute('rx',w);}
  function tick(){
    if(!state.last){$('clock').innerHTML='<span style="opacity:.5">aún sin registrar</span>';$('status').textContent='Tocá "Acabo de tomar uno" para empezar.';setFill(0.92);return;}
    let s=Math.floor((Date.now()-state.last)/1000);const d=Math.floor(s/86400);s-=d*86400;const h=Math.floor(s/3600);s-=h*3600;const m=Math.floor(s/60);s-=m*60;
    $('clock').innerHTML=pad(d)+'<span class="u">d</span>'+pad(h)+'<span class="u">h</span>'+pad(m)+'<span class="u">m</span>'+pad(s)+'<span class="u">s</span>';
    $('status').textContent=statusFor(d);
    const frac=Math.max(0.10,Math.min(0.92,0.92-(d/30)*0.82));setFill(frac);
  }
  const toast=$('toast');let tt;function showToast(t){toast.textContent=t;toast.classList.add('on');clearTimeout(tt);tt=setTimeout(()=>toast.classList.remove('on'),2800);}
  function diasDesde(){if(!state.last)return null;return Math.floor((Date.now()-state.last)/86400000);}

  $('sos').addEventListener('click',()=>{
    const d=diasDesde();const desde=d===null?'demasiado':(d>0?`hace ${d} día${d>1?'s':''}`:'hoy mismo');
    const msg=`🔴 S.O.S NEGRONI 🔴\n\n¿Cuándo fue tu último Negroni? El mío fue ${desde} y la sed aprieta.\nBusco con quién tomar uno. ¿Te sumás? 🍸\n\n— enviado con S.O.S Negroni · ABB Bartenders`;
    if(navigator.share){navigator.share({title:'S.O.S NEGRONI',text:msg}).catch(()=>{});}else{window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');}
    showToast('🚨 Bengala lanzada');
  });
  $('friend').addEventListener('click',()=>{const msg='Che, ¿te tomás un Negroni conmigo? 🍸 Hace rato que no me siento a uno como la gente.';window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');});
  $('bar').addEventListener('click',()=>{
    const w=window.open('https://www.google.com/maps/search/cocteler%C3%ADa+bar+cerca+de+m%C3%AD/','_blank');
    showToast('📍 Buscando coctelerías cerca…');
    if(navigator.geolocation&&w){navigator.geolocation.getCurrentPosition(p=>{try{w.location=`https://www.google.com/maps/search/bar+de+cocteler%C3%ADa/@${p.coords.latitude},${p.coords.longitude},15z`;}catch(e){}},()=>{},{timeout:6000,enableHighAccuracy:true});}
  });
  $('remind').addEventListener('click',()=>{
    const d=new Date();d.setDate(d.getDate()+7);d.setHours(19,0,0,0);const end=new Date(d.getTime()+3600000);
    const fmt=x=>x.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
    const url='https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent('🍸 Hora del Negroni')+'&dates='+fmt(d)+'/'+fmt(end)+'&details='+encodeURIComponent('La sed avisa. Es momento de un buen Negroni. — S.O.S Negroni · ABB Bartenders');
    window.open(url,'_blank');showToast('🗓️ Recordatorio en 7 días, 19:00');
  });
  $('reg').addEventListener('click',()=>{state.last=Date.now();save(state);tick();showToast('🍊 ¡Salud! Negroni registrado');});

  (async()=>{const saved=await load();if(saved&&typeof saved.last!=='undefined')state=saved;tick();setInterval(tick,1000);})();
</script>
</body>
</html>
